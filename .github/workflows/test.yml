name: Test

on:
  workflow_call:
    inputs:
      use_cache:
        description: "Restore and save the Deno cache."
        type: boolean
        default: true
    outputs:
      lib_coverage:
        description: "Code coverage percentage for paseri-lib."
        value: ${{ jobs.unit.outputs.lib_coverage }}
      compiler_coverage:
        description: "Code coverage percentage for paseri-compiler."
        value: ${{ jobs.unit.outputs.compiler_coverage }}
      vite_plugin_coverage:
        description: "Code coverage percentage for paseri-vite-plugin."
        value: ${{ jobs.unit.outputs.vite_plugin_coverage }}

permissions: {}

jobs:
  unit:
    name: Run unit tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      lib_coverage: ${{ steps.tests.outputs.LIB_COVERAGE }}
      compiler_coverage: ${{ steps.tests.outputs.COMPILER_COVERAGE }}
      vite_plugin_coverage: ${{ steps.tests.outputs.VITE_PLUGIN_COVERAGE }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Deno
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2
        with:
          deno-version: "^2.9.0"

      - name: Get DENO_DIR
        if: ${{ inputs.use_cache }}
        id: deno-cache
        shell: bash
        run: |
          echo "DENO_DIR=$(deno info | grep DENO_DIR | sed 's/\x1B\[[0-9;]\{1,\}[A-Za-z]//g' | cut -d ':' -f 2 | xargs)" >> $GITHUB_OUTPUT

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        if: ${{ inputs.use_cache }}
        name: Setup Deno cache
        with:
          path: ${{ steps.deno-cache.outputs.DENO_DIR }}
          key: ${{ runner.os }}-deno-cache
          restore-keys: |
            ${{ runner.os }}-deno-cache

      - name: Run tests
        id: tests
        run: |
          # --unstable-unsafe-proto restores Object.prototype.__proto__ (deleted by default in Deno), so
          # the suite tests the Annex B semantics every browser and default Node.js consumer gets.
          deno test -P --unstable-unsafe-proto --doc --parallel --coverage=.cov-lib paseri-lib/ bin/
          deno test -P --unstable-unsafe-proto --doc --parallel --coverage=.cov-compiler paseri-compiler/
          # The plugin suite spawns a real `vite build` (esbuild/Rollup native, dev server) — its
          # extra permissions come from paseri-vite-plugin/deno.json via -P. No --doc (not doc-tested)
          # and no --unstable-unsafe-proto (it doesn't exercise __proto__ Annex B semantics).
          deno test -P --parallel --coverage=.cov-vite-plugin paseri-vite-plugin/
          extract() {
            deno coverage "$1" --include="$2" | grep "All files" | sed 's/\x1B\[[0-9;]\{1,\}[A-Za-z]//g' | cut -d '|' -f 3 | xargs
          }
          echo "LIB_COVERAGE=$(extract .cov-lib paseri-lib/src/)" >> $GITHUB_OUTPUT
          echo "COMPILER_COVERAGE=$(extract .cov-compiler paseri-compiler/src/)" >> $GITHUB_OUTPUT
          echo "VITE_PLUGIN_COVERAGE=$(extract .cov-vite-plugin paseri-vite-plugin/src/)" >> $GITHUB_OUTPUT

      - name: Write main metrics
        if: github.ref == 'refs/heads/main'
        env:
          LIB_COVERAGE: ${{ steps.tests.outputs.LIB_COVERAGE }}
          COMPILER_COVERAGE: ${{ steps.tests.outputs.COMPILER_COVERAGE }}
          VITE_PLUGIN_COVERAGE: ${{ steps.tests.outputs.VITE_PLUGIN_COVERAGE }}
        run: |
          printf '%s' "$LIB_COVERAGE" > main-coverage-lib.txt
          printf '%s' "$COMPILER_COVERAGE" > main-coverage-compiler.txt
          printf '%s' "$VITE_PLUGIN_COVERAGE" > main-coverage-vite-plugin.txt

      - name: Save main lib coverage metric
        if: github.ref == 'refs/heads/main'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: main-coverage-lib.txt
          key: main-metrics-coverage-lib-${{ github.sha }}

      - name: Save main compiler coverage metric
        if: github.ref == 'refs/heads/main'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: main-coverage-compiler.txt
          key: main-metrics-coverage-compiler-${{ github.sha }}

      - name: Save main vite-plugin coverage metric
        if: github.ref == 'refs/heads/main'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: main-coverage-vite-plugin.txt
          key: main-metrics-coverage-vite-plugin-${{ github.sha }}

      - name: Restore main lib coverage metric
        if: github.event_name == 'pull_request'
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: main-coverage-lib.txt
          key: main-metrics-coverage-lib-${{ github.event.pull_request.base.sha }}
          restore-keys: |
            main-metrics-coverage-lib-

      - name: Restore main compiler coverage metric
        if: github.event_name == 'pull_request'
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: main-coverage-compiler.txt
          key: main-metrics-coverage-compiler-${{ github.event.pull_request.base.sha }}
          restore-keys: |
            main-metrics-coverage-compiler-

      - name: Restore main vite-plugin coverage metric
        if: github.event_name == 'pull_request'
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: main-coverage-vite-plugin.txt
          key: main-metrics-coverage-vite-plugin-${{ github.event.pull_request.base.sha }}
          restore-keys: |
            main-metrics-coverage-vite-plugin-

      - name: Compute coverage delta
        if: github.event_name == 'pull_request'
        id: delta
        env:
          LIB_COVERAGE: ${{ steps.tests.outputs.LIB_COVERAGE }}
          COMPILER_COVERAGE: ${{ steps.tests.outputs.COMPILER_COVERAGE }}
          VITE_PLUGIN_COVERAGE: ${{ steps.tests.outputs.VITE_PLUGIN_COVERAGE }}
        run: |
          delta_for() {
            local pr_cov="$1"
            local cache_file="$2"
            pr_cov=$(printf '%s' "$pr_cov" | tr -cd '0-9.' | head -c 8)
            if [ -f "$cache_file" ]; then
              local main_cov
              main_cov=$(tr -cd '0-9.' < "$cache_file" | head -c 8)
              local delta
              delta=$(awk -v a="$pr_cov" -v b="$main_cov" 'BEGIN { printf "%+.2f", a - b }')
              printf '%s|%s|%s' "$pr_cov" "${main_cov}%" "$delta"
            else
              printf '%s|%s|%s' "$pr_cov" "no cached baseline" "n/a"
            fi
          }
          IFS='|' read -r lib_pr lib_main lib_delta <<<"$(delta_for "$LIB_COVERAGE" main-coverage-lib.txt)"
          IFS='|' read -r compiler_pr compiler_main compiler_delta <<<"$(delta_for "$COMPILER_COVERAGE" main-coverage-compiler.txt)"
          IFS='|' read -r vite_plugin_pr vite_plugin_main vite_plugin_delta <<<"$(delta_for "$VITE_PLUGIN_COVERAGE" main-coverage-vite-plugin.txt)"
          {
            echo "## Coverage"
            echo ""
            echo "| Package | This PR | main | Δ |"
            echo "|---------|---------|------|---|"
            echo "| paseri-lib | ${lib_pr}% | ${lib_main} | ${lib_delta} |"
            echo "| paseri-compiler | ${compiler_pr}% | ${compiler_main} | ${compiler_delta} |"
            echo "| paseri-vite-plugin | ${vite_plugin_pr}% | ${vite_plugin_main} | ${vite_plugin_delta} |"
          } >> "$GITHUB_STEP_SUMMARY"
          {
            echo "lib_pr=$lib_pr"
            echo "lib_main=$lib_main"
            echo "lib_delta=$lib_delta"
            echo "compiler_pr=$compiler_pr"
            echo "compiler_main=$compiler_main"
            echo "compiler_delta=$compiler_delta"
            echo "vite_plugin_pr=$vite_plugin_pr"
            echo "vite_plugin_main=$vite_plugin_main"
            echo "vite_plugin_delta=$vite_plugin_delta"
          } >> "$GITHUB_OUTPUT"

      - name: Post coverage comment
        if: |
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          LIB_PR: ${{ steps.delta.outputs.lib_pr }}
          LIB_MAIN: ${{ steps.delta.outputs.lib_main }}
          LIB_DELTA: ${{ steps.delta.outputs.lib_delta }}
          COMPILER_PR: ${{ steps.delta.outputs.compiler_pr }}
          COMPILER_MAIN: ${{ steps.delta.outputs.compiler_main }}
          COMPILER_DELTA: ${{ steps.delta.outputs.compiler_delta }}
          VITE_PLUGIN_PR: ${{ steps.delta.outputs.vite_plugin_pr }}
          VITE_PLUGIN_MAIN: ${{ steps.delta.outputs.vite_plugin_main }}
          VITE_PLUGIN_DELTA: ${{ steps.delta.outputs.vite_plugin_delta }}
        with:
          script: |
            const marker = '<!-- paseri-coverage -->';
            const body = [
              marker,
              '## Coverage',
              '',
              '| Package | This PR | main | Δ |',
              '|---------|---------|------|---|',
              `| paseri-lib | ${process.env.LIB_PR}% | ${process.env.LIB_MAIN} | ${process.env.LIB_DELTA} |`,
              `| paseri-compiler | ${process.env.COMPILER_PR}% | ${process.env.COMPILER_MAIN} | ${process.env.COMPILER_DELTA} |`,
              `| paseri-vite-plugin | ${process.env.VITE_PLUGIN_PR}% | ${process.env.VITE_PLUGIN_MAIN} | ${process.env.VITE_PLUGIN_DELTA} |`,
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.startsWith(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
