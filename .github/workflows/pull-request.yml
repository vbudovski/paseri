name: Pull request

on:
  pull_request:
    types: [ opened, synchronize, reopened ]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions: {}

jobs:
  lint:
    permissions:
      contents: read
    uses: ./.github/workflows/lint.yml

  commitlint:
    permissions:
      contents: read
    uses: ./.github/workflows/commitlint.yml

  changeset:
    permissions:
      contents: read
    uses: ./.github/workflows/changeset-check.yml

  lockfile:
    permissions:
      contents: read
    uses: ./.github/workflows/lockfile-check.yml

  zizmor:
    permissions:
      contents: read
      security-events: write
    uses: ./.github/workflows/zizmor.yml

  test:
    needs: [lint, commitlint]
    permissions:
      contents: read
      pull-requests: write
    uses: ./.github/workflows/test.yml

  bundle-size:
    needs: [lint, commitlint]
    permissions:
      contents: read
      pull-requests: write
    uses: ./.github/workflows/bundle-size.yml
