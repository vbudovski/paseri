name: Lint

on: workflow_call

permissions: {}

jobs:
  unit:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Deno
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2
        with:
          deno-version: "^2.9.0"

      - name: Get pnpm store directory
        id: deno-cache
        shell: bash
        run: |
          echo "DENO_DIR=$(deno info | grep DENO_DIR | sed 's/\x1B\[[0-9;]\{1,\}[A-Za-z]//g' | cut -d ':' -f 2 | xargs)" >> $GITHUB_OUTPUT

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        name: Setup Deno cache
        with:
          path: ${{ steps.deno-cache.outputs.DENO_DIR }}
          key: ${{ runner.os }}-deno-cache
          restore-keys: |
            ${{ runner.os }}-deno-cache

      - name: Biome CI
        id: biome-ci
        run: |
          deno task ci
