name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions: {}

jobs:
  test:
    permissions:
      contents: read
      pull-requests: write
    uses: ./.github/workflows/test.yml
    with:
      use_cache: false

  bundle-size:
    permissions:
      contents: read
      pull-requests: write
    uses: ./.github/workflows/bundle-size.yml

  badges:
    needs: [test, bundle-size]
    runs-on: ubuntu-latest
    environment: badges
    permissions: {}
    steps:
      - name: Update coverage badge
        uses: schneegans/dynamic-badges-action@0e50b8bad39e7e1afd3e4e9c2b7dd145fad07501 # v1.8.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: 80548a1b87f9f00fe1ae426ca6a2a517
          filename: vbudovski_paseri_main-coverage.svg
          label: coverage
          message: ${{ needs.test.outputs.coverage }}%
          valColorRange: ${{ needs.test.outputs.coverage }}
          minColorRange: 50
          maxColorRange: 90

      - name: Update bundle size badge
        uses: schneegans/dynamic-badges-action@0e50b8bad39e7e1afd3e4e9c2b7dd145fad07501 # v1.8.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: 80548a1b87f9f00fe1ae426ca6a2a517
          filename: vbudovski_paseri_main-bundlesize.svg
          label: minzip
          message: ${{ needs.bundle-size.outputs.bundle_size }}
          color: blue

  publish:
    needs: test
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write # Required for pushing tags and creating draft GitHub releases.
      id-token: write # The OIDC ID token is used for authentication with JSR.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up Deno
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2
        with:
          deno-version: "^2.7.14"

      - run: deno publish

      - name: Read version
        id: version
        run: echo "version=$(jq -r .version paseri-lib/deno.json)" >> "$GITHUB_OUTPUT"

      - name: Tag release
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin "v$VERSION"

      - name: Create draft GitHub release
        env:
          VERSION: ${{ steps.version.outputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          awk '/^## /{if(p)exit;p=1;next}p' paseri-lib/CHANGELOG.md > /tmp/release-notes.md
          gh release create "v$VERSION" \
            --draft \
            --title "v$VERSION" \
            --notes-file /tmp/release-notes.md
